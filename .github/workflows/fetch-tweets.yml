name: Fetch Tweets

on:
  schedule:
    # Run every 2 hours (GitHub Actions cron is in UTC)
    - cron: "0 */2 * * *"
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write # Allow committing to repo

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests twikit

      - name: Fetch tweets
        env:
          SOCIALDATA_API_KEY: ${{ secrets.SOCIALDATA_API_KEY }}
          TWITTER_AUTH_TOKEN: ${{ secrets.TWITTER_AUTH_TOKEN }}
          TWITTER_CT0: ${{ secrets.TWITTER_CT0 }}
        run: |
          python fetch_tweets.py

      - name: Commit results
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add tweets.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update tweets [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git push
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tweets
          path: tweets.json
          retention-days: 7
